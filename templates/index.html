<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> AI Chatbot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-container">

  <div class="chat-header">
    <div class="title">AI Chatbot</div>
    <div class="status">Online</div>
  </div>

  <div id="chat-box">
    <div class="bot-message welcome">
      <p>👋 Welcome to AI Chatbot</p>
      <span>I’m your virtual assistant. How can I help you today?</span>
    </div>
  </div>

  <div class="input-area">
    <input
      id="message"
      type="text"
      placeholder="Ask me anything..."
      onkeydown="if(event.key==='Enter'){sendMessage()}"
    />
    <button onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
async function sendMessage() {
  let input = document.getElementById("message");
  let msg = input.value.trim();
  if (!msg) return;

  let chatBox = document.getElementById("chat-box");

  chatBox.innerHTML += `
    <div class="user-message">
      ${msg}
      <div class="time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
    </div>
  `;

  input.value = "";
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    let res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });

    let data = await res.json();

    chatBox.innerHTML += `
      <div class="bot-message">
        ${data.reply}
        <div class="time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
      </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

  } catch {
    chatBox.innerHTML += `<div class="bot-message error">Server error</div>`;
  }
}
</script>

</body>
</html>
